<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="notepad-icon.jpg" type="image/x-icon">
  <title>To do App</title>
</head>
<body>
  <div class="container">

    <h1 class="todoHeader">To do List</h1>
    <div class="mobileview">
      <p id="totalTask2"></p>
      <p id="taskDone2"></p>
      <p id="taskLeft2"></p>
    </div>
    <div class="inputSpc">
      <input
          type="text"
          id="taskInput"
          placeholder="Enter task">

      <button id="addBtn">
          &plus;
      </button>
    </div>
    <ul id="taskList">
      <div id="bg-image"></div>
      <p id="image-text">"Add Your Task"</p>
    </ul>
  </div>
  <aside>
    <p id="totalTask"></p>
    <p id="taskDone"></p>
    <p id="taskLeft"></p>
  </aside>

  <script src="script.js"></script>
</body>
</html>
